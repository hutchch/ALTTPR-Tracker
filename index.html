<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ALTTP Randomizer Tracker</title>
<style>
* { box-sizing: border-box; }
body {
  font-family: Arial, sans-serif;
  max-width: 520px; margin: 40px auto; padding: 20px;
  background: #0d0d0d; color: #ccc;
}
h1 { text-align: center; color: #4dff88; font-size: 22px; margin-bottom: 24px; letter-spacing: 1px; }
.section {
  background: #1a1a1a; border: 1px solid #2a2a2a;
  border-radius: 6px; padding: 16px; margin-bottom: 16px;
}
.section h2 { margin: 0 0 12px; color: #7ab8f5; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
.row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.row label { color: #666; font-size: 12px; min-width: 80px; }
input, select {
  background: #111; color: #ccc; border: 1px solid #333;
  border-radius: 4px; padding: 5px 8px; font-size: 12px; flex: 1;
}
input:focus, select:focus { outline: none; border-color: #4dff88; }
.info { color: #444; font-size: 10px; margin-top: 2px; padding-left: 90px; }
.btn-row { display: flex; gap: 10px; margin-top: 8px; }
.launch-btn {
  flex: 1; padding: 12px;
  font-size: 14px; font-weight: bold; cursor: pointer;
  border: none; border-radius: 6px; transition: background 0.2s;
}
#btn-items { background: #1a4a2a; color: #4dff88; border: 1px solid #2a7a3a; }
#btn-items:hover { background: #2a6a3a; }
#btn-map   { background: #1a2e4a; color: #7ab8f5; border: 1px solid #2a4e7a; }
#btn-map:hover   { background: #2a4a6a; }
#btn-both  { background: #3a2a00; color: #ffd700; border: 1px solid #7a5a00; }
#btn-both:hover  { background: #5a4000; }
.divider { border: none; border-top: 1px solid #222; margin: 4px 0 12px; }
</style>
</head>
<body>

<h1>⚔ ALTTP Tracker</h1>

<div class="section">
  <h2>Connection</h2>
  <div class="row">
    <label>Host</label>
    <input id="ws-host" type="text" value="localhost" placeholder="localhost">
  </div>
  <div class="row">
    <label>Port</label>
    <input id="ws-port" type="text" value="23074" placeholder="23074">
  </div>
  <div class="info">QUsb2Snes / SNI — default port 23074</div>
</div>

<div class="section">
  <h2>Display</h2>
  <div class="row">
    <label>Item Scale</label>
    <select id="item-scale">
      <option value="1.0">100%</option>
      <option value="1.1">110%</option>
      <option value="1.2">120%</option>
      <option value="1.3">130%</option>
      <option value="1.4">140%</option>
      <option value="1.5">150%</option>
    </select>
  </div>
  <div class="row">
    <label>Map Scale</label>
    <select id="map-zoom">
      <option value="70">70%</option>
      <option value="80">80%</option>
      <option value="90">90%</option>
      <option value="100" selected>100%</option>
      <option value="110">110%</option>
      <option value="120">120%</option>
      <option value="130">130%</option>
      <option value="140">140%</option>
      <option value="150">150%</option>
    </select>
  </div>
</div>

<div class="btn-row">
  <button class="launch-btn" id="btn-items" onclick="launchItems()">Items Only</button>
  <button class="launch-btn" id="btn-map"   onclick="launchMap()">Map Only</button>
  <button class="launch-btn" id="btn-both"  onclick="launchBoth()">Launch Both</button>
</div>

<script>
function save() {
  localStorage.setItem('alttp-ws-host',    document.getElementById('ws-host').value);
  localStorage.setItem('alttp-ws-port',    document.getElementById('ws-port').value);
  localStorage.setItem('alttp-item-scale', document.getElementById('item-scale').value);
  localStorage.setItem('alttp-map-zoom',   document.getElementById('map-zoom').value);
}

function launchItems() {
  save();
  var scale = document.getElementById('item-scale').value || '1.0';
  var url   = 'itemtracker.html?scale=' + scale;
  window.open(url, 'alttp-items', 'width=500,height=390,resizable=yes');
}

function launchMap() {
  save();
  var zoom   = document.getElementById('map-zoom').value || '100';
  var layout = localStorage.getItem('alttp-map-layout') || 'horizontal';
  var size   = Math.round(512 * parseInt(zoom) / 100);
  var chrome = 92; // topbar + bottombar + OS window chrome
  var w = layout === 'vertical' ? size + 20 : size * 2 + 20;
  var h = size + chrome;
  var url = 'map.html?zoom=' + zoom;
  window.open(url, 'alttp-map', 'width=' + w + ',height=' + h + ',resizable=yes');
}

function launchBoth() {
  save();
  // Open both synchronously — browsers allow multiple window.open calls
  // triggered directly from the same user gesture without a setTimeout
  var scale  = document.getElementById('item-scale').value || '1.0';
  var zoom   = document.getElementById('map-zoom').value || '100';
  var layout = localStorage.getItem('alttp-map-layout') || 'horizontal';
  var size   = Math.round(512 * parseInt(zoom) / 100);
  var chrome = 92;
  var mapW   = layout === 'vertical' ? size + 20 : size * 2 + 20;
  var mapH   = size + chrome;
  window.open('itemtracker.html?scale=' + scale, 'alttp-items', 'width=500,height=390,resizable=yes');
  window.open('map.html?zoom=' + zoom, 'alttp-map', 'width=' + mapW + ',height=' + mapH + ',resizable=yes');
}

// Restore saved values
window.addEventListener('DOMContentLoaded', function() {
  var fields = {
    'ws-host':    'alttp-ws-host',
    'ws-port':    'alttp-ws-port',
    'item-scale': 'alttp-item-scale',
    'map-zoom':   'alttp-map-zoom',
  };
  for (var id in fields) {
    var val = localStorage.getItem(fields[id]);
    if (val) document.getElementById(id).value = val;
  }
});
</script>
</body>
</html>
