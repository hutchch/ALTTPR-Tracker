<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ALTTP Map</title>
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; connect-src * ws://*:*; img-src 'self' data:; style-src 'self' 'unsafe-inline';">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  background: #000;
  font-family: Arial, sans-serif;
  color: #ccc;
  user-select: none;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

/* ── Topbar ── */
#topbar {
  display: flex; align-items: center; gap: 8px; flex-shrink: 0;
  padding: 4px 10px; background: #111; border-bottom: 1px solid #222;
  font-size: 11px;
}
.tb-label { color: #888; }
.tb-select {
  background: #1a1a1a; color: #ccc; border: 1px solid #333;
  border-radius: 3px; padding: 2px 5px; font-size: 11px; cursor: pointer;
}
.tb-sep { color: #333; margin: 0 2px; }
.zoom-btn {
  background: #1a1a1a; color: #ccc; border: 1px solid #333;
  border-radius: 3px; padding: 0 7px; font-size: 15px; line-height: 1.6;
  cursor: pointer; font-weight: bold;
}
.zoom-btn:hover { background: #333; color: #fff; }
#zoom-label { color: #fff; min-width: 40px; text-align: center; font-size: 11px; font-weight: bold; }

/* ── Scroll area ── */
#maps-outer {
  flex: 1;
  overflow: auto;
  background: #000;
  min-height: 0;
}
#maps { display: inline-flex; flex-direction: row; gap: 12px; }
#maps.vertical { flex-direction: column; }

.map-wrap {
  position: relative;
  width: 512px; height: 512px;
  background-size: 100% 100%;
  background-repeat: no-repeat;
  flex-shrink: 0;
}
#lw { background-image: url('map/map_lw.png'); }
#dw { background-image: url('map/map_dw.png'); }

/* ── Check dots ── */
.dot {
  position: absolute;
  width: 18px; height: 18px;
  border-radius: 2px;
  transform: translate(-50%, -50%);
  cursor: pointer;
  z-index: 2;
  transition: transform 0.08s;
}
.dot:hover { transform: translate(-50%,-50%) scale(1.5); z-index: 20; }
.dot.available { background: #4dff88; border: 2px solid #000; }
.dot.possible  { background: #ffd700; border: 2px solid #000; }
.dot.visible   { background: #ff8c00; border: 2px solid #000; }
.dot.unavail   { background: #ff4444; border: 2px solid #000; }
.dot.cleared   { background: rgba(40,40,40,0.85); border: 1.5px solid #555; }

/* ── Dungeon markers ── */
.dng {
  position: absolute;
  width: 28px; height: 28px;
  border-radius: 3px;
  transform: translate(-50%, -50%);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  z-index: 5;
  border: 2px solid #000;
  background: #ff4444;
  overflow: hidden;
  transition: transform 0.08s;
}
.dng:hover { transform: translate(-50%,-50%) scale(1.2); z-index: 25; }
.dng.available   { background: #4dff88; border-color: #000; }
.dng.boss-cleared { background: #9bd0f5; border-color: #000; opacity: 0.75; } /* boss beaten, items remain */
.dng.possible  { background: #ffd700; border-color: #000; }
.dng.visible   { background: #ff8c00; border-color: #000; }
.dng.unavail   { background: #ff4444; border-color: #000; }
.dng.cleared   { background: rgba(70,70,70,0.85); border-color: #666; opacity: 0.75; }
.dng img       { width: 22px; height: 22px; object-fit: contain; image-rendering: pixelated; }
.dng.no-prize  { font-size: 8px; font-weight: bold; color: #fff; }

/* ── Bottom bar ── */
#bottombar {
  display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
  padding: 3px 10px; background: #0a0a0a; border-top: 1px solid #1a1a1a;
  font-size: 10px;
}
#legend { display: flex; align-items: center; gap: 10px; }
.leg    { display: flex; align-items: center; gap: 3px; }
.lb     { width: 10px; height: 10px; border-radius: 2px; }
.lb.available { background: #4dff88; border: 1.5px solid #000; }
.lb.possible  { background: #ffd700; border: 1.5px solid #000; }
.lb.visible   { background: #ff8c00; border: 1.5px solid #000; }
.lb.unavail   { background: #ff4444; border: 1.5px solid #000; }
.lb.cleared   { background: rgba(40,40,40,0.85); border: 1px solid #555; }
#conn-status  { color: #555; font-weight: bold; letter-spacing: 0.3px; }
#conn-status.connected    { color: #4dff88; }
#conn-status.connecting   { color: #ffd700; }
#conn-status.disconnected { color: #555; }
#conn-status.error        { color: #ff4444; }

#reconnect-btn {
  width: 20px; height: 20px;
  font-size: 14px; line-height: 20px; text-align: center; padding: 0;
  background: rgba(0,0,0,0.7); color: #7ab8f5;
  border: 1px solid #3a6ea8; border-radius: 4px;
  cursor: pointer; transition: color 0.2s, background 0.2s;
}
#reconnect-btn:hover { background: #2a5a9c; color: #fff; }
#reconnect-btn:active { transform: scale(0.9); }
#reconnect-btn.spinning {
  color: #ffd700; border-color: #ffd700; cursor: default;
  animation: spin 1s linear infinite;
}
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

/* ── Tooltip ── */
#tip {
  position: fixed; pointer-events: none; z-index: 9999;
  background: rgba(0,0,0,0.92); color: #eee;
  font-size: 11px; padding: 4px 9px;
  border-radius: 3px; border: 1px solid #333;
  white-space: nowrap; display: none;
}
</style>

</div>

<script>
/**

 */

function sramCleared(data, flag) {
  if (!data || !data.length) return false;
  if (Array.isArray(flag[0])) {
    // Group flag: ALL sub-flags must be set
    for (var i = 0; i < flag.length; i++) {
      var off = flag[i][0], mask = flag[i][1];
      if (off >= data.length) return false;
      if ((data[off] & mask) === 0) return false;
    }
    return true;
  }
  // Single flag
  var off = flag[0], mask = flag[1];
  if (off >= data.length) return false;
  return (data[off] & mask) !== 0;
}
window.sramCleared = sramCleared;

// ── Dungeon map positions [left%, top%] ──────────────────────────────────────
// LW dungeons on map_lw, DW dungeons on map_dw
window.DUNGEON_POSITIONS = {
  ep:  { world: 'lw', left: 92.0, top: 38.8, label: 'EP'  },
  dp:  { world: 'lw', left:  7.6, top: 78.4, label: 'DP'  },
  toh: { world: 'lw', left: 57.0, top:  3.0, label: 'ToH' },
  ct:  { world: 'lw', left: 50.0, top: 52.6, label: 'AT'  },
  pod: { world: 'dw', left: 92.8, top: 40.0, label: 'POD' },
  sp:  { world: 'dw', left: 47.0, top: 91.0, label: 'SP'  },
  sw:  { world: 'dw', left:  8.0, top:  7.2, label: 'SW'  },
  tt:  { world: 'dw', left: 12.8, top: 47.9, label: 'TT'  },
  ip:  { world: 'dw', left: 79.6, top: 85.8, label: 'IP'  },
  mm:  { world: 'dw', left: 11.5, top: 84.5, label: 'MM'  },
  tr:  { world: 'dw', left: 92.8, top:  7.2, label: 'TR'  },
  gt:  { world: 'dw', left: 57.0, top:  2.0, label: 'GT'  },
};

// ── Dungeon logic ─────────────────────────────────────────────────────────────
// Returns 'green','yellow','orange','red'
function dungeonColor(key) {
  var it = window.trackerItems;
  var hasMedallion = function(dungeonKey) {
    if (it.mmMedallion > 0 && dungeonKey === 'mm') {
      var med = it.mmMedallion; // 1=bombos,2=ether,3=quake
      return (med === 1 && it.bombos) || (med === 2 && it.ether) || (med === 3 && it.quake);
    }
    if (it.trMedallion > 0 && dungeonKey === 'tr') {
      var med = it.trMedallion;
      return (med === 1 && it.bombos) || (med === 2 && it.ether) || (med === 3 && it.quake);
    }
    // If unset, any medallion works as possibility
    return it.bombos || it.ether || it.quake;
  };

  switch (key) {
    case 'ep':
      // Yellow until lamp found; green with lamp
      return it.lamp ? 'green' : 'yellow';

    case 'dp':
      // Red until (Book or (Mirror + Flute + TitansMitt))
      // Yellow if those but missing Boots; green with boots
      var hasAccess = it.book || (it.mirror && it.flute && it.gloves >= 2);
      if (!hasAccess) return 'red';
      return it.boots ? 'green' : 'yellow';

    case 'toh':
      // (gloves or flute) AND (mirror or hammer) to reach; lamp to see
      var hasAccess = (it.gloves >= 1 || it.flute >= 1) && (it.mirror >= 1 || it.hammer >= 1);
      if (!hasAccess) return 'red';
      return it.lamp ? 'green' : 'yellow';

    case 'hc':
      // Hyrule Castle - always accessible in standard
      return it.lamp ? 'green' : 'yellow';

    case 'ct':
      // Red until lamp AND (sword>=1 OR cape)
      if (!it.lamp) return 'red';
      return (it.sword >= 1 || it.cape) ? 'green' : 'red';

    case 'pod':
      // Red until moonpearl + (hammer+gloves OR flippers+gloves)
      if (!it.moonpearl || it.gloves < 1) return 'red';
      var canEnter = it.hammer || it.flippers;
      if (!canEnter) return 'red';
      return it.lamp ? 'green' : 'yellow';

    case 'sp':
      // Red until moonpearl + mirror + flippers
      if (!it.moonpearl || !it.mirror || !it.flippers) return 'red';
      return it.hookshot ? 'green' : 'yellow';

    case 'sw':
      // Red until moonpearl + gloves>=1 + hammer
      if (!it.moonpearl || !(it.gloves >= 1) || !it.hammer) return 'red';
      return it.firerod ? 'green' : 'yellow';

    case 'tt':
      // Red until moonpearl + (hammer + gloves>=1) OR titans mitt
      if (!it.moonpearl) return 'red';
      if (it.gloves >= 2) return 'green';               // titans mitt
      if (it.hammer && it.gloves >= 1) return 'green';  // hammer + power glove
      return 'red';

    case 'ip':
      // Red until moonpearl + flippers + titansMitt + (bombos or firerod)
      if (!it.moonpearl || !it.flippers || it.gloves < 2) return 'red';
      if (!it.bombos && !it.firerod) return 'red';
      return 'green';

    case 'mm':
      // Red until flute + titans mitt + medallion known and obtained
      if (!it.flute || it.gloves < 2) return 'red';
      if (it.mmMedallion === 0) return 'red'; // unknown medallion = can't enter
      if (!hasMedallion('mm')) return 'red';  // wrong medallion marked
      return (it.somaria && it.lamp) ? 'green' : 'yellow';

    case 'tr':
      // Red until moonpearl + hammer + titansMitt + somaria + medallion known and obtained
      if (!it.moonpearl || !it.hammer || it.gloves < 2 || !it.somaria) return 'red';
      if (it.trMedallion === 0) return 'red'; // unknown medallion = can't enter
      if (!hasMedallion('tr')) return 'red';  // wrong medallion marked
      return (it.firerod && it.lamp) ? 'green' : 'yellow';

    case 'gt':
      // Red until 7 crystals
      return it.crystals >= 7 ? 'green' : 'red';

    default:
      return 'green';
  }
}
window.dungeonColor = dungeonColor;

</script>
<script>
// ── Check logic ───────────────────────────────────────────────────────────────
(function() {
function checkLogic(it) {
  var pearl    = it.moonpearl >= 1;
  var glove    = it.gloves >= 1;
  var titan    = it.gloves >= 2;
  var boots    = it.boots >= 1;
  var hookshot = it.hookshot >= 1;
  var hammer   = it.hammer >= 1;
  var mirror   = it.mirror >= 1;
  var lamp     = it.lamp >= 1;
  var flute    = it.flute >= 1;
  var firerod  = it.firerod >= 1;
  var somaria  = it.somaria >= 1;
  var byrna    = it.byrna >= 1;
  var cape     = it.cape >= 1;
  var book     = it.book >= 1;
  var bombos   = it.bombos >= 1;
  var bomb     = it.bomb >= 1;
  var ether    = it.ether >= 1;
  var quake    = it.quake >= 1;
  var powder   = it.powder >= 1;
  var shovel   = it.shovel >= 1;
  var flippers = it.flippers >= 1;
  var sword1   = it.sword >= 1;
  var sword2   = it.sword >= 2;
  var aga      = it.agahnim >= 1;
  var bottle1  = it.bottle >= 1;
  var mushroom = it.mushroom >= 1;

  var climbDM = glove || flute;
  var eastDM  = climbDM && (hookshot || (mirror && hammer));
  var DMlight = lamp || flute;
  var dwNW    = pearl && (titan || (glove && hammer) || (aga && hookshot && (hammer || glove || flippers)));
  var dwEast  = pearl && (aga || (hammer && glove) || (titan && flippers));
  var dwSouth = dwNW || (aga && pearl && hammer);

  function medColor(dkey) {
    if (!sword1) return 'red';
    var req = (dkey === 'mm') ? it.mmMedallion : it.trMedallion;
    if (req === 0) {
      if (bombos && ether && quake) return 'green';
      if (bombos || ether || quake) return 'yellow';
      return 'red';
    }
    if (req === 1 && bombos) return 'green';
    if (req === 2 && ether)  return 'green';
    if (req === 3 && quake)  return 'green';
    return 'red';
  }

  var ORD = { red:0, orange:1, yellow:2, green:3 };
  function worst(a,b) { return ORD[a] < ORD[b] ? a : b; }

  return {
    0:   function() { if (!boots) return 'red'; return (titan||(dwNW&&mirror)) ? 'green' : 'red'; },
    1:   function() { return 'green'; },
    2:   function() { return 'green'; },
    3:   function() { // Spiral Cave: (gloves or flute) AND (mirror or hammer), lamp to see
           var canReach = (glove || flute) && (mirror || hammer);
           if (!canReach) return 'red';
           return lamp ? 'green' : 'yellow';
         },
    4:   function() {
           if (!pearl||!hammer||!titan||!somaria||!mirror) return 'red';
           var m=medColor('tr'); if(m==='red') return 'red';
           return (!firerod||!DMlight) ? worst(m,'yellow') : worst(m,'green');
         },
    5:   function() { return 'green'; },
    6:   function() { return bomb ? 'green' : 'red'; },
    7:   function() { return dwNW ? 'green' : 'red'; },
    8:   function() { return dwNW ? 'green' : 'red'; },
    9:   function() { return bomb ? 'green' : 'red'; },
    10:  function() { return (pearl&&flute&&titan) ? 'green' : 'red'; },
    11:  function() { if (!pearl||!titan||!eastDM) return 'red'; return DMlight ? 'green' : 'yellow'; },
    12:  function() { return bomb ? 'green' : 'red'; },
    13:  function() { if (!pearl||!glove||!hammer||(!byrna&&!cape)) return 'red'; return DMlight ? 'green' : 'yellow'; },
    14:  function() { return bomb ? 'green' : 'red'; },
    15:  function() { return bomb ? 'green' : 'red'; },
    16:  function() { return dwSouth ? 'green' : 'red'; },
    17:  function() { if (!eastDM) return 'red'; return DMlight ? 'green' : 'yellow'; },
    18:  function() { return boots ? 'green' : 'red'; },

];

// ── Persistent check state ────────────────────────────────────────────────────
// Always start fresh — checks are cleared on each page load (new game).
var checkState = {};
try { localStorage.removeItem('alttp-checks'); } catch(e) {}
function saveCheckState() { try { localStorage.setItem('alttp-checks', JSON.stringify(checkState)); } catch(e) {} }

function resetChecks() {
  checkState = {};
  saveCheckState();
  // Reset prize-derived item counts
  window.trackerItems.crystals     = 0;
  window.trackerItems.pendants     = 0;
  window.trackerItems.greenPendant = 0;
  window.trackerItems.redCrystal   = 0;

    dotById[id].className = dotClass(parseInt(id));
  });
  // Reset dungeon cleared/obtained state
  Object.keys(DUNGEONS).forEach(function(key) {
    DUNGEONS[key].cleared       = false;
    DUNGEONS[key].prizeObtained = false;
    DUNGEONS[key].fullyCleared  = false;
    refreshDungeonImg(key);
  });
  window.refreshMapLogic();
}

// ── trackerItems default (no items) ──────────────────────────────────────────
window.trackerItems = window.trackerItems || {
  bow:0, boomerang:0, hookshot:false, bomb:false, mushroom:0, powder:false,
  firerod:false, icerod:false, bombos:false, ether:false, quake:false,
  lamp:false, hammer:false, shovel:false, flute:0, net:false, book:false,
  bottle:0, somaria:false, byrna:false, cape:false, mirror:false,
  boots:false, gloves:0, flippers:false, moonpearl:false,
  sword:0, shield:0, tunic:1, agahnim:false, crystals:0,
  mmMedallion:0, trMedallion:0,
  crystals:0, pendants:0, greenPendant:0, redCrystal:0
};

var lwEl = document.getElementById('lw');
var dwEl = document.getElementById('dw');
var dotById = {};

// ── Dot logic color ───────────────────────────────────────────────────────────
function dotClass(id) {
  if (checkState[id]) return 'dot cleared';
  var color = window.checkColor ? window.checkColor(id) : 'green';
  var cls = { green:'available', yellow:'possible', orange:'visible', red:'unavail' };
  return 'dot ' + (cls[color] || 'available');
}

// ── Build dots ────────────────────────────────────────────────────────────────
CHECKS.forEach(function(c) {
  var id = c[0], lft = c[1], top = c[2], name = c[3], world = c[4];
  var d = document.createElement('div');
  d.className = dotClass(id);
  d.style.left = lft + '%';
  d.style.top  = top + '%';
  d.title = name;
  d.addEventListener('click', function() {
    checkState[id] = !checkState[id];
    d.className = dotClass(id);
    saveCheckState();
  });
  d.addEventListener('mouseenter', function(e) { showTip(name, e); });
  d.addEventListener('mousemove',  moveTip);
  d.addEventListener('mouseleave', hideTip);
  (world === 'lw' ? lwEl : dwEl).appendChild(d);
  dotById[id] = d;
});

// ── Build dungeon markers ─────────────────────────────────────────────────────
var dngEls = {};
Object.keys(DUNGEONS).forEach(function(key) {
  var def = DUNGEONS[key];
  var el  = document.createElement('div');
  el.className = 'dng unavail';
  el.style.left = def.left + '%';
  el.style.top  = def.top  + '%';

  var img = document.createElement('img');
  // Start with uncollected (dim) image
  img.src = def.img;
  img.alt = def.label;
  el.appendChild(img);

  // Only cycle prize for dungeons with a prize (prize >= 0)
  el.addEventListener('click', function() {
    if (def.prize >= 0) cyclePrize(key);
  });
  el.addEventListener('mouseenter', function(e) { showTip(def.label + ' — ' + dngStatusText(key), e); });
  el.addEventListener('mousemove',  moveTip);
  el.addEventListener('mouseleave', hideTip);
  (def.world === 'lw' ? lwEl : dwEl).appendChild(el);
  dngEls[key] = el;
});

// Cycle through crystal/pendant types on click
function cyclePrize(key) {
  var def = DUNGEONS[key];
  def.prize = (def.prize + 1) % PRIZE_CYCLE.length;
  def.img        = PRIZE_CYCLE[def.prize].img;
  def.imgCleared = PRIZE_CYCLE[def.prize].imgCleared;
  refreshDungeonImg(key);
}

// Prize image: bright (1.png = img) until obtained, then dim (0.png = imgCleared)
function refreshDungeonImg(key) {
  var def = DUNGEONS[key];
  var img = dngEls[key].querySelector('img');
  if (!img) return;
  img.src = def.cleared ? def.imgCleared : def.img;
}

// ── Logic refresh ─────────────────────────────────────────────────────────────
var COLOR_CLASS = { green:'available', yellow:'possible', orange:'visible', red:'unavail' };

window.refreshMapLogic = function() {
  Object.keys(DUNGEONS).forEach(function(key) {
    var def = DUNGEONS[key];
    var el  = dngEls[key];
    if (def.fullyCleared) {
      // All items + boss done — go dark
      el.className = 'dng cleared';
    } else if (def.cleared) {
      // Boss beaten but items remain — light green box
      el.className = 'dng boss-cleared';
    } else {
      var c = COLOR_CLASS[window.dungeonColor(key)] || 'unavail';
      el.className = 'dng ' + c;
    }
    // Prize image: bright (1.png) until obtained, then dim (0.png)
    var img = dngEls[key].querySelector('img');
    if (img) {
      img.src = def.cleared ? def.imgCleared : def.img;
    }
  });
  // Refresh dot cleared state
  Object.keys(dotById).forEach(function(id) {
    dotById[id].className = dotClass(id);
  });
};

function dngStatusText(key) {
  var t = { green:'Available', yellow:'Possible', orange:'Visible only', red:'Unavailable' };
  return t[window.dungeonColor(key)] || '';
}

// ── SRAM autotracking via BroadcastChannel ────────────────────────────────────
window.onRoomsUpdated = function(data) {
  // Auto-clear check dots
  var dirty = false;
  CHECKS.forEach(function(c) {
    var id = c[0];
    if (!checkState[id] && window.SRAM_FLAGS[id] && window.sramCleared(data, window.SRAM_FLAGS[id])) {
      checkState[id] = true;
      if (dotById[id]) dotById[id].className = dotClass(id);
      dirty = true;
    }
  });
  if (dirty) saveCheckState();

  // Boss defeat → clear dungeon
  Object.keys(DUNGEONS).forEach(function(key) {
    var def = DUNGEONS[key];
    if (def.bossOffset === null || def.bossOffset === undefined || def.bossOffset >= data.length) return;
    if ((data[def.bossOffset] & 0x08) !== 0 && !def.cleared) {
      def.cleared = true;
      refreshDungeonImg(key);
      window.refreshMapLogic();
    }
  });
};

// Track last time rooms data arrived via BroadcastChannel
var _lastBcRooms = 0;

try {
  var _bc = new BroadcastChannel('alttp-tracker');
  _bc.onmessage = function(e) {
    if (!e.data) return;
    switch (e.data.type) {
      case 'medallions':
        window.trackerItems.mmMedallion = e.data.data.mmMedallion || 0;
        window.trackerItems.trMedallion = e.data.data.trMedallion || 0;
        window.refreshMapLogic();
        break;
      case 'items':
        // Merge snap into trackerItems, preserving prize-derived and medallion fields
        // Use !== undefined so snap value of 0 is respected (not treated as "missing")
        var snap = e.data.data;
        var savedCrystals     = window.trackerItems.crystals     || 0;
        var savedPendants     = window.trackerItems.pendants     || 0;
        var savedGreenPendant = window.trackerItems.greenPendant || 0;
        var savedRedCrystal   = window.trackerItems.redCrystal   || 0;
        var savedMmMed        = window.trackerItems.mmMedallion  || 0;
        var savedTrMed        = window.trackerItems.trMedallion  || 0;
        window.trackerItems = snap;
        window.trackerItems.crystals     = snap.crystals     !== undefined ? snap.crystals     : savedCrystals;
        window.trackerItems.pendants     = snap.pendants     !== undefined ? snap.pendants     : savedPendants;
        window.trackerItems.greenPendant = snap.greenPendant !== undefined ? snap.greenPendant : savedGreenPendant;
        window.trackerItems.redCrystal   = snap.redCrystal   !== undefined ? snap.redCrystal   : savedRedCrystal;
        window.trackerItems.mmMedallion  = snap.mmMedallion  !== undefined ? snap.mmMedallion  : savedMmMed;
        window.trackerItems.trMedallion  = snap.trMedallion  !== undefined ? snap.trMedallion  : savedTrMed;
        window.refreshMapLogic();
        break;
      case 'rooms':
        _lastBcRooms = Date.now();
        window.onRoomsUpdated(e.data.data);
        // If map's own WS isn't connected, show that BC is feeding data
        if (!_mapWs || _mapWs.readyState !== WebSocket.OPEN) {
          setConnStatus('Tracking via Item Tracker', 'connected');
        }
        break;
      case 'prizes':
        var pz = e.data.data;
        // Update medallion assignments if included in message
        if (window.trackerItems) {
          if (e.data.mmMedallion !== undefined) window.trackerItems.mmMedallion = e.data.mmMedallion;
          if (e.data.trMedallion !== undefined) window.trackerItems.trMedallion = e.data.trMedallion;
        }
        Object.keys(pz).forEach(function(key) {
          if (!DUNGEONS[key]) return;
          var idx = pz[key].state;
          if (idx >= 0 && idx < PRIZE_CYCLE.length) {
            DUNGEONS[key].prize      = idx;
            DUNGEONS[key].img        = PRIZE_CYCLE[idx].img;
            DUNGEONS[key].imgCleared = PRIZE_CYCLE[idx].imgCleared;
          }
          // obtained = prize actually collected (0.png = bright in tracker convention)
          DUNGEONS[key].prizeObtained = pz[key].obtained || false;
          refreshDungeonImg(key);
        });
        // Pendant/crystal counts from obtained prizes only
        if (window.trackerItems) {
          var pc=0, gpc=0, rc=0, cc=0;
          Object.keys(DUNGEONS).forEach(function(k) {
            var def = DUNGEONS[k];
            if (!def.prizeObtained) return;
            var p = def.prize;
            if      (p===0){cc++;}
            else if (p===1){cc++;rc++;}
            else if (p===2){pc++;}
            else if (p===3){pc++;gpc++;}
          });
          window.trackerItems.crystals     = cc;
          window.trackerItems.pendants     = pc;
          window.trackerItems.greenPendant = gpc;
          window.trackerItems.redCrystal   = rc;
        }
        window.refreshMapLogic();
        break;
      case 'dungeonComplete':
        var dc = e.data.data;
        Object.keys(dc).forEach(function(key) {
          if (!DUNGEONS[key]) return;
          var prev = DUNGEONS[key].fullyCleared;
          DUNGEONS[key].fullyCleared = dc[key].allItems && dc[key].prizeCollected;
          if (DUNGEONS[key].fullyCleared !== prev) {
            window.refreshMapLogic();
          }
        });
        break;
      case 'status':
        setConnStatus(e.data.text, e.data.cls);
        break;
    }
  };
} catch(ex) {}

// ── Tooltip ───────────────────────────────────────────────────────────────────
function showTip(text, e) { var t = document.getElementById('tip'); t.textContent = text; t.style.display = 'block'; moveTip(e); }
function hideTip()        { document.getElementById('tip').style.display = 'none'; }
function moveTip(e) {
  var t = document.getElementById('tip');
  var x = e.clientX + 14, y = e.clientY - 30;
  if (x + 200 > window.innerWidth)  x = e.clientX - 210;
  if (y < 4) y = e.clientY + 14;
  t.style.left = x + 'px';
  t.style.top  = y + 'px';
}

// ── Zoom + Layout ─────────────────────────────────────────────────────────────
// Declare zoom state first so resizeWindowToMap can reference it
var ZOOM_STEPS = [70, 80, 90, 100, 110, 120, 130, 140, 150];
var zoomIdx = 1;

// Non-map chrome: topbar (~28px) + bottombar (~24px) + OS window chrome (~40px)
var CHROME_H = 92;

function resizeWindowToMap() {
  var pct    = ZOOM_STEPS[zoomIdx];
  var size   = Math.round(512 * pct / 100);
  var maps   = document.getElementById('maps');
  var isVert = maps ? maps.classList.contains('vertical') : false;
  var w = isVert ? size + 20 : size * 2 + 32;
  var h = size + CHROME_H;
  try { window.resizeTo(w, h); } catch(e) {}
}

function setLayout(val) {
  var maps = document.getElementById('maps');
  if (val === 'vertical') maps.classList.add('vertical');
  else maps.classList.remove('vertical');
  try { localStorage.setItem('alttp-map-layout', val); } catch(ex) {}
  resizeWindowToMap();
}

function applyZoom() {
  var pct  = ZOOM_STEPS[zoomIdx];
  var size = Math.round(512 * pct / 100);
  document.querySelectorAll('.map-wrap').forEach(function(el) {
    el.style.width  = size + 'px';
    el.style.height = size + 'px';
  });
  document.getElementById('zoom-label').textContent = pct + '%';
  try { localStorage.setItem('alttp-map-zoom', String(pct)); } catch(ex) {}
  resizeWindowToMap();
}
function changeZoom(dir) {
  zoomIdx = Math.max(0, Math.min(ZOOM_STEPS.length - 1, zoomIdx + dir));
  applyZoom();
}

// ── Init layout + zoom from URL params / localStorage ────────────────────────
(function() {
  var p = new URLSearchParams(window.location.search);

  // Restore zoom index
  var pct  = parseInt(p.get('scale') || p.get('zoom') || '0') ||
             parseInt(localStorage.getItem('alttp-map-zoom') || '0') || 100;
  var best = 1, bestD = 9999;
  ZOOM_STEPS.forEach(function(z, i) { var d = Math.abs(z - pct); if (d < bestD) { bestD = d; best = i; } });
  zoomIdx = best;

  // Apply zoom (sets map-wrap sizes + resizes window)
  applyZoom();

  // Apply layout (also resizes window, which is fine — same size if horizontal default)
  var val = p.get('layout') || localStorage.getItem('alttp-map-layout') || 'horizontal';
  var sel = document.getElementById('layout-sel');
  if (sel) sel.value = val;
  setLayout(val);
})();

// ── Initialise prize counts in trackerItems from DUNGEONS defaults ────────────
(function() {
  var pc=0, gpc=0, rc=0, cc=0;
  Object.keys(DUNGEONS).forEach(function(k) {
    var def = DUNGEONS[k];
    if (!def.prizeObtained) return;
    var p = def.prize;
    if      (p===0){cc++;}
    else if (p===1){cc++;rc++;}
    else if (p===2){pc++;}
    else if (p===3){pc++;gpc++;}
  });
  window.trackerItems.crystals     = cc;
  window.trackerItems.pendants     = pc;
  window.trackerItems.greenPendant = gpc;
  window.trackerItems.redCrystal   = rc;
})();

window.refreshMapLogic();

// ── Map's own WebSocket connection ────────────────────────────────────────────
// The map connects independently so it works even without the item tracker open.
var _mapWs = null;
var _mapReconnectTimer = null;
var _mapPollTimer = null;

function setConnStatus(text, cls) {
  var el = document.getElementById('conn-status');
  el.textContent = '● ' + text;
  el.className = cls || 'disconnected';
}

function mapConnect() {
  var host = localStorage.getItem('alttp-ws-host') || 'localhost';
  var port = localStorage.getItem('alttp-ws-port') || '23074';

  if (_mapWs) { _mapWs.onclose = null; _mapWs.onerror = null; _mapWs.close(); _mapWs = null; }
  clearTimeout(_mapReconnectTimer); clearInterval(_mapPollTimer);

  setConnStatus('Connecting…', 'connecting');
  try { _mapWs = new WebSocket('ws://' + host + ':' + port); }
  catch(e) { setConnStatus('Error', 'error'); _scheduleReconnect(); return; }
  _mapWs.binaryType = 'arraybuffer';

  var _attached = false;

  _mapWs.onopen = function() {
    _mapWs.send(JSON.stringify({ Opcode: 'DeviceList', Space: 'SNES' }));
  };

  var _mapRoomChunk1 = null;
  var _mapRoomChunk1Time = 0;
  _mapWs.onmessage = function(evt) {
    if (evt.data instanceof ArrayBuffer) {
      var data = new Uint8Array(evt.data);
      if (data.length === 0x280) {
        var now = Date.now();
        if (_mapRoomChunk1 === null || (now - _mapRoomChunk1Time) > 1500) {
          _mapRoomChunk1 = data;
          _mapRoomChunk1Time = now;
        } else {
          var merged = new Uint8Array(0x500);
          merged.set(_mapRoomChunk1, 0);
          merged.set(data, 0x280);
          _mapRoomChunk1 = null;
          _mapRoomChunk1Time = 0;
          window.onRoomsUpdated(merged);
        }
      } else if (data.length === 0x420 || data.length === 0x500) {
        window.onRoomsUpdated(data);
      }
      return;
    }
    var r; try { r = JSON.parse(evt.data); } catch(e) { return; }
    if (!r.Results) return;
    if (!_attached) {
      if (!r.Results.length) { setConnStatus('No device', 'disconnected'); _scheduleReconnect(); return; }
      var dev = r.Results[0];
      _mapWs.send(JSON.stringify({ Opcode: 'Attach', Space: 'SNES', Operands: [dev] }));
      _mapWs.send(JSON.stringify({ Opcode: 'Name',   Space: 'SNES', Operands: ['ALTTP Map'] }));
      _attached = true;
      setConnStatus('Connected', 'connected');
      // Poll room data in two chunks — skip if BroadcastChannel is feeding fresh data
      _mapPollTimer = setInterval(function() {
        var bcFresh = (Date.now() - _lastBcRooms) < 3000;
        if (!bcFresh && _mapWs && _mapWs.readyState === WebSocket.OPEN) {
          _mapWs.send(JSON.stringify({ Opcode: 'GetAddress', Space: 'SNES', Operands: ['F5F000', '280'] }));
          _mapWs.send(JSON.stringify({ Opcode: 'GetAddress', Space: 'SNES', Operands: ['F5F280', '280'] }));
        }
      }, 1000);
    }
  };

  _mapWs.onerror = function() {
    // Don't show error if item tracker BC is feeding us data
    if ((Date.now() - _lastBcRooms) > 5000) {
      setConnStatus('Error — retrying…', 'error');
    }
  };
  _mapWs.onclose = function() {
    clearInterval(_mapPollTimer);
    _attached = false;
    if ((Date.now() - _lastBcRooms) > 5000) {
      setConnStatus('Disconnected — retrying…', 'disconnected');
    }
    _scheduleReconnect();
  };
}

function _scheduleReconnect() {
  clearTimeout(_mapReconnectTimer);
  _mapReconnectTimer = setTimeout(mapConnect, 3000);
}

function mapReconnect() {
  var btn = document.getElementById('reconnect-btn');
  btn.classList.add('spinning'); btn.disabled = true;
  clearTimeout(_mapReconnectTimer);
  mapConnect();
  setTimeout(function() { btn.classList.remove('spinning'); btn.disabled = false; }, 3000);
}

// Auto-connect on load
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', mapConnect);
} else {
  mapConnect();
}
</script>
