<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ALTTP Item Tracker</title>
<meta http-equiv="Content-Security-Policy" content="connect-src * ws://*:*;">
<link rel="stylesheet" href="items.css">
</head>
<body>

<div class="tracker-container"></div>

<script src="items.js"></script>
<script>
// ── Set up BroadcastChannel so items.js can broadcast to map ──────────────────
try { window._itemsBc = new BroadcastChannel('alttp-tracker'); } catch(e) {}

// ── Load host/port from launcher settings before items.js connectWebSocket ────
(function() {
  var host = localStorage.getItem('alttp-ws-host') || 'localhost';
  var port = parseInt(localStorage.getItem('alttp-ws-port') || '23074');
  wsHost = host;   // items.js `let wsHost`
  wsPort = port;   // items.js `let wsPort`
})();

// ── Scale from URL param ──────────────────────────────────────────────────────
(function() {
  var p = new URLSearchParams(window.location.search);
  window._trackerScale = parseFloat(p.get('scale')) || 1;
  if (window._trackerScale !== 1) document.body.style.zoom = window._trackerScale;
})();

// ── Self-resize: measure content after render and fit window to it ────────────
window.addEventListener('load', function() {
  setTimeout(function() {
    try {
      var s = window._trackerScale || 1;
      var body = document.body;
      var chromeW = window.outerWidth  - window.innerWidth;
      var chromeH = window.outerHeight - window.innerHeight;
      if (chromeW <= 0) chromeW = 16;
      if (chromeH <= 0) chromeH = 40;
      // body.scrollWidth/Height report pre-zoom logical pixels — multiply by scale
      var w = Math.ceil(body.scrollWidth  * s) + chromeW;
      var h = Math.ceil(body.scrollHeight * s) + chromeH;
      window.resizeTo(w, h);
    } catch(e) {}
  }, 200);
});

// ── Hook: broadcast prizes whenever a dungeon prize changes ───────────────────
function broadcastPrizes() {
  if (!window._itemsBc) return;
  try {
    var prizes = {};
    Object.keys(dungeons).forEach(function(key) {
      if (dungeons[key].bigkeyOnly) return;
      var prizeImg = document.querySelector('[data-dungeon-key="' + key + '"] .prize-img');
      if (!prizeImg) return;
      var src = prizeImg.src || '';
      // state = prize type (0=crystal,1=redcrystal,2=pendant,3=greenpendant)
      // obtained = boss beaten = prize image changed to 0.png (bright) by SRAM auto-clear
      prizes[key] = {
        state:    src.includes('greenpendant') ? 3 : src.includes('pendant') ? 2 : src.includes('redcrystal') ? 1 : 0,
        obtained: src.includes('0.png')
      };
    });
    // Include medallion assignments so map always has current values
    var mm = window.trackerItems ? (window.trackerItems.mmMedallion || 0) : 0;
    var tr = window.trackerItems ? (window.trackerItems.trMedallion || 0) : 0;
    window._itemsBc.postMessage({ type: 'prizes', data: prizes, mmMedallion: mm, trMedallion: tr });
  } catch(e) {}
}

window.onPrizeCycled = function() { setTimeout(broadcastPrizes, 30); };

// ── Medallion label cycling → broadcast items ─────────────────────────────────
var _origCycleLabel = window.cycleMedallionLabel;
window.cycleMedallionLabel = function(itemKey, slot) {
  if (_origCycleLabel) _origCycleLabel(itemKey, slot);
  var label = items[itemKey] ? items[itemKey].medallionLabel : '';
  var medIdx = {bombos:1, ether:2, quake:3}[itemKey] || 0;
  if (!window.trackerItems) window.trackerItems = {};
  if      (label === 'MM')   { window.trackerItems.mmMedallion = medIdx; window.trackerItems.trMedallion = 0; }
  else if (label === 'TR')   { window.trackerItems.mmMedallion = 0;      window.trackerItems.trMedallion = medIdx; }
  else if (label === 'BOTH') { window.trackerItems.mmMedallion = medIdx; window.trackerItems.trMedallion = medIdx; }
  else                       { window.trackerItems.mmMedallion = 0;      window.trackerItems.trMedallion = 0; }
  // Broadcast immediately so map updates without needing SRAM
  if (window._itemsBc) {
    window._itemsBc.postMessage({ type: 'medallions', data: {
      mmMedallion: window.trackerItems.mmMedallion,
      trMedallion: window.trackerItems.trMedallion
    }});
  }
};

// ── DOMContentLoaded: init tracker then connect via items.js stack ────────────
document.addEventListener('DOMContentLoaded', function() {
  // createTracker() was already called by items.js DOMContentLoaded handler.
  // Start WS using items.js's own connectWebSocket (already has UI hooks).
  connectWebSocket();
  // Broadcast initial (empty) prizes once DOM is ready
  setTimeout(broadcastPrizes, 500);
});
</script>
</body>
</html>
